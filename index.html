<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:ital,wght@0,200;0,300;0,400;0,600;0,700;0,900;1,200;1,300;1,400;1,600;1,700;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/style.css">
    <title>Document</title>
</head>
<body>
    <main class="main-gallery">
        <div class="main-gallery__container">
            <img class="main-gallery__img main-gallery__img--left" src="./imgs/left-Mask group.jpg" alt="left">
            <img class="main-gallery__img main-gallery__img--middle" src="./imgs/middle Mask group.jpg" alt="middle">
            <img class="main-gallery__img main-gallery__img--right" src="./imgs/right Mask group.jpg" alt="right">
        </div>
    </main>

    <section class="hero">
        <div class="hero__content">
            <div class="hero__headline">
                <h1 class="hero__title">Hello Flower!<br>FA EXHIBITION 2021</h1>
            
                <div class="hero__info-block info">
                    <h2 class="info__label">INFORMATION</h2>
                    
                    <p class="info__datetime info__datetime--en">
                        <span class="info__date">2021 JUL 1(THU)-3(SAT)</span><br>
                        <span class="info__time">DAY1 10am-6pm OTHER 10am-5:30pm</span>
                    </p>

                    <h3 class="info__location">at PARK SIDE HALL</h3>

                    <p class="info__datetime info__datetime--jp">
                        2021年7月1日(木)ー3日(土)<br>
                        Day1 10時〜18時 その他 10時〜17時30分
                    </p>
                </div>
            </div>
        </div>
    </section>

    <section class="gallery">
        <h2 class="gallery_title">GALLERY</h2>

        <div class="gallery__content">
            <img class="picture-left" src="./imgs/flower1.jpg" alt="">
            <img class="picture-right" src="./imgs/flower2.jpg" alt="">
            <img class="picture-left" src="./imgs/flower3.jpg" alt="">
            <img class="picture-right" src="./imgs/flower4.jpg" alt="">
            <img class="picture-left" src="./imgs/flower5.jpg" alt="">
            <img class="picture-right" src="./imgs/flower6.jpg" alt="">
        </div>
    </section>

<script src="./style.js"></script>
</body>
</html>
